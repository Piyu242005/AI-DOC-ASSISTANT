name: 🤖 NeuraFlow CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: 🏗️ Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax Check
        run: |
          find . -name "*.py" \
            ! -path "./.git/*" \
            ! -path "./.venv/*" \
            ! -path "./venv/*" \
            -exec python -m py_compile {} \;

      - name: Import Check
        run: |
          python -c "from app import main" || echo "App Import check (may require Streamlit context)"
          python -c "from providers.base_provider import BaseProvider"
          python -c "from services.agent_engine import AgentEngine"
          python -c "from services.rag_engine import RAGEngine"
          python -c "from services.telegram_logger import TelegramLogger"
          python -c "from utils.helpers import format_token_usage"

      - name: Black Formatting Check
        run: black --check .

      - name: Isort Check
        run: isort --check-only .

      - name: Flake8 Linting
        run: flake8 . --max-line-length=100 --exclude=.git,__pycache__,.venv,venv --ignore=E203,W503

      - name: Bandit Security Scan
        run: bandit -r . -ll

      - name: Docker Build
        run: docker build -t neuraflow:test .

      - name: Summary
        if: always()
        run: |
          echo "## 🤖 CI Pipeline Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
