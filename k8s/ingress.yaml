apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: neuraflow-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # Security Headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
spec:
  tls:
  - hosts:
    - neuraflow.ai
    - api.neuraflow.ai
    secretName: neuraflow-tls
  rules:
  - host: neuraflow.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: neuraflow-ai-service
            port:
              number: 8501
  - host: api.neuraflow.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: neuraflow-ai-service
            port:
              number: 8501
