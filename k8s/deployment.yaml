apiVersion: apps/v1
kind: Deployment
metadata:
  name: neuraflow-ai
  namespace: default
  labels:
    app: neuraflow-ai
spec:
  replicas: 3
  selector:
    matchLabels:
      app: neuraflow-ai
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: neuraflow-ai
    spec:
      containers:
      - name: neuraflow-ai
        image: neuraflow-ai:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8501
          name: http
        envFrom:
        - configMapRef:
            name: neuraflow-config
        - secretRef:
            name: neuraflow-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /_stcore/health
            port: 8501
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /_stcore/health
            port: 8501
          initialDelaySeconds: 15
          periodSeconds: 5
